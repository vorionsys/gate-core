name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'   # ships npm >= 11.5.1 (trusted publishing); do NOT self-update npm — the global update is broken on current runner images (missing bundled sigstore)
          registry-url: 'https://registry.npmjs.org'
      - name: Install
        run: npm install
      - name: Gates
        run: |
          npm run build
          npm test
      - name: Publish (tokenless OIDC, provenance; skips if version already on registry)
        run: |
          PKG=$(npm pkg get name | tr -d '"')
          VER=$(npm pkg get version | tr -d '"')
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "$PKG@$VER already published — skipping (gates above still ran)"
          else
            npm publish --provenance --access public
          fi
