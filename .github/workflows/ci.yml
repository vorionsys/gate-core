name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install
        run: npm install
      - name: Build
        run: npm run build
      - name: Test (one per reason code + chain round-trip)
        run: npm test
